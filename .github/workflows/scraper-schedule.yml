name: Glints Auto Scraper

on:
  schedule:
    # Berjalan setiap 2 jam sekali (di menit ke-0)
    - cron: '0 */2 * * *'
  workflow_dispatch:


permissions:
  contents: write # Mengizinkan GitHub Actions untuk mengedit/menambah file CSV ke repositori

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # 1. Ambil semua file yang ada di repositori kamu saat ini
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Pasang bahasa pemrograman Python di komputer virtual GitHub
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Instal library 'requests' yang dibutuhkan skrip kita
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. Jalankan skrip Python untuk melakukan scraping data terbaru
    - name: Run Scraper Script
      run: python scraper.py

    # 5. Simpan otomatis file CSV hasil scraping kembali ke repositori GitHub kamu
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add postingan_terbaru.csv
        # Hanya commit jika ada perubahan data (lowongan baru dimasukkan)
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data lowongan terbaru [Skip CI]" && git push)
